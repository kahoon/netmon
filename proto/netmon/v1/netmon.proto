syntax = "proto3";

package netmon.v1;

option go_package = "github.com/kahoon/netmon/proto/netmon/v1;netmonv1";

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

service NetmonService {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc WatchStatus(WatchStatusRequest) returns (stream WatchStatusResponse);
  rpc WatchTasks(WatchTasksRequest) returns (stream WatchTasksResponse);
  rpc WatchChecks(WatchChecksRequest) returns (stream WatchChecksResponse);
  rpc Trace(TraceRequest) returns (stream TraceResponse);
  rpc GetState(GetStateRequest) returns (GetStateResponse);
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
  rpc GetDiagnostics(GetDiagnosticsRequest) returns (GetDiagnosticsResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc SetDebug(SetDebugRequest) returns (SetDebugResponse);
  rpc SetRuntimeStatsInterval(SetRuntimeStatsIntervalRequest) returns (SetRuntimeStatsIntervalResponse);
  rpc SetAlertHistoryInterval(SetAlertHistoryIntervalRequest) returns (SetAlertHistoryIntervalResponse);
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_OK = 1;
  SEVERITY_INFO = 2;
  SEVERITY_WARN = 3;
  SEVERITY_CRIT = 4;
}

enum RefreshScope {
  REFRESH_SCOPE_UNSPECIFIED = 0;
  REFRESH_SCOPE_ALL = 1;
  REFRESH_SCOPE_INTERFACE = 2;
  REFRESH_SCOPE_LISTENERS = 3;
  REFRESH_SCOPE_UPSTREAM = 4;
  REFRESH_SCOPE_UNBOUND = 5;
  REFRESH_SCOPE_PIHOLE = 6;
  REFRESH_SCOPE_TAILSCALE = 7;
}

enum TaskEventKind {
  TASK_EVENT_KIND_UNSPECIFIED = 0;
  TASK_EVENT_KIND_SCHEDULED = 1;
  TASK_EVENT_KIND_RESCHEDULED = 2;
  TASK_EVENT_KIND_EXECUTING = 3;
  TASK_EVENT_KIND_EXECUTED = 4;
  TASK_EVENT_KIND_CANCELLED = 5;
  TASK_EVENT_KIND_FAILED = 6;
}

message Check {
  string key = 1;
  string name = 2;
  Severity severity = 3;
  string summary = 4;
  string detail = 5;
}

message GetStatusRequest {}

message GetStatusResponse {
  Severity overall_severity = 1;
  string summary = 2;
  string public_ipv4 = 3;
  string public_ipv6 = 4;
  repeated Check checks = 5;
}

message WatchStatusRequest {}

message WatchStatusResponse {
  GetStatusResponse status = 1;
}

message WatchTasksRequest {}

message TaskEvent {
  google.protobuf.Timestamp at = 1;
  string id = 2;
  TaskEventKind kind = 3;
  google.protobuf.Duration delay = 4;
  google.protobuf.Duration duration = 5;
  string error = 6;
}

message WatchTasksResponse {
  TaskEvent event = 1;
}

message WatchChecksRequest {}

message CheckEvent {
  google.protobuf.Timestamp at = 1;
  string key = 2;
  string label = 3;
  Severity previous_severity = 4;
  string previous_summary = 5;
  string previous_detail = 6;
  Severity current_severity = 7;
  string current_summary = 8;
  string current_detail = 9;
}

message WatchChecksResponse {
  CheckEvent event = 1;
}

message TraceRequest {
  RefreshScope scope = 1;
}

message TraceEvent {
  google.protobuf.Timestamp at = 1;
  string trace_id = 2;
  string kind = 3;
  string message = 4;
  map<string, string> fields = 5;
}

message TraceResponse {
  TraceEvent event = 1;
}

message GetStateRequest {}

message InterfaceState {
  string name = 1;
  int32 link_index = 2;
  bool link_up = 3;
  string oper_state = 4;
  repeated string ula = 5;
  repeated string gua = 6;
  repeated string usable_gua = 7;
  string collection_error = 8;
}

message ListenerBinding {
  bool any = 1;
  bool ipv4 = 2;
  bool ipv6 = 3;
  bool loopback_only = 4;
  repeated string addresses = 5;
}

message ListenerState {
  ListenerBinding dns53_tcp = 1;
  ListenerBinding dns53_udp = 2;
  ListenerBinding resolver5335_tcp = 3;
  ListenerBinding resolver5335_udp = 4;
  string collection_error = 5;
}

message DnsProbeResult {
  string name = 1;
  string target = 2;
  string status = 3;
  string detail = 4;
  google.protobuf.Duration latency = 5;
}

message PublicIPObservation {
  string provider = 1;
  string target = 2;
  string ip = 3;
  string detail = 4;
  google.protobuf.Duration latency = 5;
}

message DnssecProbeAttempt {
  string name = 1;
  string target = 2;
  string status = 3;
  string rcode = 4;
  bool ad = 5;
  string detail = 6;
  google.protobuf.Duration latency = 7;
}

message DnssecProbeResult {
  DnssecProbeAttempt positive = 1;
  DnssecProbeAttempt negative = 2;
}

message UpstreamState {
  DnsProbeResult root_v4 = 1;
  DnsProbeResult root_v6 = 2;
  DnsProbeResult recursive_v4 = 3;
  DnsProbeResult recursive_v6 = 4;
  PublicIPObservation public_ipv4 = 5;
  PublicIPObservation public_ipv6 = 6;
  reserved 7;
  reserved "dnssec";
}

message UnboundState {
  DnssecProbeResult dnssec = 1;
}

message PiHoleStatus {
  string blocking = 1;
  string detail = 2;
  string core_version = 3;
  string web_version = 4;
  string ftl_version = 5;
}

message PiHoleUpstreams {
  repeated string servers = 1;
  bool matches_expected = 2;
  string detail = 3;
}

message PiHoleGravity {
  google.protobuf.Timestamp last_updated = 1;
  uint64 domains_blocked = 2;
  bool stale = 3;
  string detail = 4;
}

message PiHoleCounters {
  uint64 queries_total = 1;
  uint64 queries_blocked = 2;
  uint64 cache_hits = 3;
  uint64 forwarded = 4;
  uint64 clients_active = 5;
  string detail = 6;
}

message DnsLatencyWindow {
  google.protobuf.Duration last = 1;
  google.protobuf.Duration average = 2;
  google.protobuf.Duration max = 3;
  uint64 samples = 4;
  string trend = 5;
}

message PiHoleState {
  DnsProbeResult dns_v4 = 1;
  DnsProbeResult dns_v6 = 2;
  PiHoleStatus status = 3;
  PiHoleUpstreams upstreams = 4;
  PiHoleGravity gravity = 5;
  PiHoleCounters counters = 6;
  DnsLatencyWindow latency_ipv4 = 7;
  DnsLatencyWindow latency_ipv6 = 8;
}

message TailscaleStatus {
  bool running = 1;
  string backend_state = 2;
  bool authenticated = 3;
  bool connected = 4;
  string version = 5;
  string host_name = 6;
  string dns_name = 7;
  string tailnet = 8;
  string magic_dns_suffix = 9;
  string detail = 10;
}

message TailscaleAddresses {
  string ipv4 = 1;
  string ipv6 = 2;
}

message TailscalePeers {
  uint64 total = 1;
  uint64 online = 2;
  uint64 direct = 3;
  uint64 relay = 4;
}

message TailscaleRoles {
  bool advertises_exit_node = 1;
  repeated string advertised_routes = 2;
  string detail = 3;
}

message TailscaleState {
  TailscaleStatus status = 1;
  TailscaleAddresses addresses = 2;
  TailscalePeers peers = 3;
  TailscaleRoles roles = 4;
}

message GetStateResponse {
  InterfaceState interface = 1;
  ListenerState listeners = 2;
  UpstreamState upstream = 3;
  UnboundState unbound = 4;
  PiHoleState pihole = 5;
  TailscaleState tailscale = 6;
}

message GetInfoRequest {}

message GetInfoResponse {
  string version = 1;
  int64 started_at_unix = 2;
  string monitor_interface = 3;
  string interface_poll = 4;
  string listener_poll = 5;
  string upstream_poll = 6;
  string runtime_stats_interval = 7;
  string ntfy_host = 8;
  string commit = 9;
  string build_time = 10;
  string unbound_poll = 11;
  string pihole_poll = 12;
  string tailscale_poll = 13;
  string alert_history_interval = 14;
}

message GetStatsRequest {}

message OutcomeCounters {
  uint64 total = 1;
  uint64 success = 2;
  uint64 failure = 3;
}

message EventCounters {
  uint64 link = 1;
  uint64 addr = 2;
  uint64 route = 3;
}

message CollectorCounters {
  uint64 started = 1;
  uint64 finished = 2;
  uint64 failed = 3;
}

message TaskCounters {
  uint64 scheduled = 1;
  uint64 rescheduled = 2;
  uint64 executing = 3;
  uint64 executed = 4;
  uint64 cancelled = 5;
  uint64 failed = 6;
}

message CheckCounters {
  uint64 evaluations = 1;
  uint64 changed = 2;
  uint64 passed = 3;
  uint64 failed = 4;
}

message NotificationCounters {
  uint64 sent = 1;
  uint64 skipped = 2;
  uint64 failed = 3;
}

message TraceCounters {
  uint64 started = 1;
  uint64 completed = 2;
  uint64 failed = 3;
}

message GetStatsResponse {
  EventCounters events = 1;
  map<string, CollectorCounters> collectors = 2;
  map<string, uint64> collector_runs = 3;
  TaskCounters tasks = 4;
  map<string, TaskCounters> tasks_by_id = 5;
  map<string, OutcomeCounters> probes = 6;
  CheckCounters checks = 7;
  NotificationCounters notifications = 8;
  TraceCounters traces = 9;
}

enum AlertDeliveryStatus {
  ALERT_DELIVERY_STATUS_UNSPECIFIED = 0;
  ALERT_DELIVERY_STATUS_DELIVERED = 1;
  ALERT_DELIVERY_STATUS_NOT_DELIVERED = 2;
}

message AlertAttempt {
  google.protobuf.Timestamp at = 1;
  AlertDeliveryStatus delivery_status = 2;
  Severity severity = 3;
  string title = 4;
  string reason = 5;
  string summary = 6;
  string delivery_error = 7;
}

message GetDiagnosticsRequest {}

message GetDiagnosticsResponse {
  string alert_history_interval = 1;
  repeated AlertAttempt alerts = 2;
}

message RefreshRequest {
  RefreshScope scope = 1;
}

message RefreshResponse {}

message SetRuntimeStatsIntervalRequest {
  google.protobuf.Duration interval = 1;
}

message SetRuntimeStatsIntervalResponse {
  google.protobuf.Duration interval = 1;
}

message SetAlertHistoryIntervalRequest {
  google.protobuf.Duration interval = 1;
}

message SetAlertHistoryIntervalResponse {
  google.protobuf.Duration interval = 1;
}

message SetDebugRequest {
  bool debug = 1;
}

message SetDebugResponse {}
